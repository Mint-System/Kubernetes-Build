## @section Nextcloud parameters
nextcloud:
  ## @param nextcloud.enabled Enable or disable Nextcloud
  enabled: true
  ## @param nextcloud.host The host for Nextcloud and Ingress
  host: ""
  externalDatabase:
    ## @param nextcloud.externalDatabase.enabled Enable or disable external database usage
    enabled: true
    ## @param nextcloud.externalDatabase.type Type of external database (e.g., postgresql, mysql)
    type: postgresql
    ## @param nextcloud.externalDatabase.host Hostname or service name of the external database
    host: nextcloud-postgresql-rw
    ## @param nextcloud.externalDatabase.database Name of the database to use
    database: nextcloud
    existingSecret:
      ## @param nextcloud.externalDatabase.existingSecret.enabled Enable or disable using an existing secret for database credentials
      enabled: true
      ## @param nextcloud.externalDatabase.existingSecret.name Name of the existing Kubernetes secret
      name: nextcloud-postgresql-app
      ## @param nextcloud.externalDatabase.existingSecret.passwordKey Key in the secret containing the database password
      passwordKey: password

## @section CloudNativePG parameters
cnpg:
  ## @param cnpg.enabled Enable or disable CloudNativePG
  enabled: true
  ## @param cnpg.instances Number of instances (1 for single, 2+ for high availability)
  instances: 1
  ## @param cnpg.imageName PostgreSQL image to use
  imageName: ghcr.io/cloudnative-pg/postgresql:16.0
  storage:
    ## @param cnpg.storage.size Persistent volume size for each instance
    size: 8Gi
  ## @param cnpg.database Name of the CloudNativePG database to create
  database: nextcloud
  ## @param cnpg.owner Name of the database user
  owner: app

## @section K8up parameters
k8up:
  ## @param k8up.enabled Enable or disable K8up
  enabled: false
  ## @param k8up.endpoint S3 endpoint
  endpoint: ""
  ## @param k8up.bucket S3 bucket name
  bucket: ""