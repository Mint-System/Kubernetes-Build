apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-taskfile-build
  labels:
    app: taskfile-build
spec:
  selector:
    matchLabels:
      app: taskfile-build
  template:
    metadata:
      labels:
        app: taskfile-build
    spec:
      containers:
        - name: taskfile-build
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-configmap
          {{- if .Values.additionalEnvs }}
          env:
            {{- range .Values.additionalEnvs }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.args }}
          args: {{ .Values.args | splitList " " | toJson }}
          {{- end }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app-data
              mountPath: /app
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: data-taskfile-build